<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Twin - Bengaluru</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body,
        html {
            height: 100%;
            background-color: #121212;
            overflow: hidden;
        }

        /* The Map Container */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Premium Glassmorphism Dashboard Panel */
        .dashboard-panel {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 360px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 28px;
            z-index: 1000;
            color: #ffffff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .dashboard-panel:hover {
            background: rgba(15, 23, 42, 0.85);
            transform: translateY(-4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: #38bdf8;
            /* Uniform bright blue */
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .section {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .data-label {
            color: #cbd5e1;
            font-weight: 300;
        }

        .data-value {
            font-weight: 600;
            color: #ffffff;
            text-transform: capitalize;
        }

        /* Risk Colors */
        .risk-high {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .risk-medium {
            color: #f59e0b;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        .risk-low {
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* Custom Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Outfit', sans-serif;
        }

        .leaflet-popup-tip {
            background: rgba(15, 23, 42, 0.9);
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <!-- This is where the Leaflet Map will draw -->
    <div id="map"></div>
    <!-- New Report Incident Form -->
    <div class="dashboard-panel" style="top: 30px; left: 30px; right: auto;">
        <h1>Report Incident</h1>
        <form id="incident-form">
            <div class="data-row">
                <input type="text" id="inc-type" placeholder="Type (e.g. Pothole)" required
                    style="width: 100%; padding: 8px; border-radius: 6px; border: none; outline: none; margin-bottom: 10px;">
            </div>
            <div class="data-row">
                <input type="text" id="inc-loc" placeholder="Location (e.g. MG Road)" required
                    style="width: 100%; padding: 8px; border-radius: 6px; border: none; outline: none; margin-bottom: 10px;">
            </div>
            <div class="data-row">
                <select id="inc-sev"
                    style="width: 100%; padding: 8px; border-radius: 6px; border: none; outline: none; margin-bottom: 10px;">
                    <option value="Low">Low Severity</option>
                    <option value="Medium">Medium Severity</option>
                    <option value="High">High Severity</option>
                </select>
            </div>
            <div class="data-row">
                <input type="text" id="inc-user" placeholder="Your Name" required
                    style="width: 100%; padding: 8px; border-radius: 6px; border: none; outline: none; margin-bottom: 10px;">
            </div>
            <div class="data-row">
                <input type="file" id="inc-image" style="width: 100%; color: white; margin-bottom: 15px;">
            </div>
            <button type="submit"
                style="width: 100%; padding: 10px; border-radius: 8px; border: none; background: #38bdf8; color: white; font-weight: bold; cursor: pointer;">
                Submit Report
            </button>
        </form>
        <p id="form-msg" style="margin-top: 10px; font-size: 0.85rem; color: #10b981; display: none;">Incident Reported!
        </p>
    </div>
    <!-- City Graphics Toggle Button -->
    <button id="toggle-analytics-btn" style="position: absolute; bottom: 30px; left: 30px; z-index: 1000; padding: 12px 24px; border-radius: 8px; border: none; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: #38bdf8; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        City Graphics
    </button>

    <!-- Analytics Dashboard Panel (Hidden by default) -->
    <div id="analytics-panel" class="dashboard-panel" style="bottom: 80px; left: 30px; right: auto; top: auto; width: 320px; padding: 15px; display: none;">
        <h1 style="font-size: 1.5rem; margin-bottom: 5px;">City Analytics</h1>
        <!-- Wrapper to prevent Chart.js from growing out of control! -->
        <div style="height: 180px; position: relative;">
            <canvas id="severityChart"></canvas>
        </div>
    </div>
    <!-- The Glassmorphism Floating Dashboard -->
    <div class="dashboard-panel">
        <h1>Urban Twin Hub</h1>

        <div class="section">
            <div class="section-title">Live Weather</div>
            <div class="data-row">
                <span class="data-label">Condition</span>
                <span class="data-value loading" id="weather-cond">Loading...</span>
            </div>
            <div class="data-row">
                <span class="data-label">Temp / Humidity</span>
                <span class="data-value loading" id="weather-temp">--</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">AI Engine Predictions</div>
            <div class="data-row">
                <span class="data-label">Traffic Risk</span>
                <span class="data-value loading" id="pred-traffic">--</span>
            </div>
            <div class="data-row">
                <span class="data-label">Infra Risk</span>
                <span class="data-value loading" id="pred-infra">--</span>
            </div>
            <div
                style="margin-top: 16px; font-size: 0.9rem; color: #94a3b8; line-height: 1.5; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px;">
                <strong style="color: #fff;">Action Plan:</strong> <br>
                <span id="pred-rec" class="loading">Analyzing current city data...</span>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let severityChartInstance = null;
        // 1. Initialize Map centered on Bengaluru
        const map = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);

        // 2. Add a Premium Dark Mode Map Layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Function to fetch data from our FastAPI backend
        async function updateDashboard() {
            try {
                // --- A. Fetch Weather ---
                const weatherRes = await fetch('/weather');
                const weatherData = await weatherRes.json();

                document.getElementById('weather-cond').textContent = weatherData.condition;
                document.getElementById('weather-cond').classList.remove('loading');

                document.getElementById('weather-temp').textContent = `${weatherData.temperature}°C  /  ${weatherData.humidity}%`;
                document.getElementById('weather-temp').classList.remove('loading');

                // --- B. Fetch AI Prediction ---
                const predRes = await fetch('/predict');
                const predData = await predRes.json();

                const tRisk = document.getElementById('pred-traffic');
                tRisk.textContent = predData.traffic_congestion_risk;
                tRisk.className = `data-value ${getRiskClass(predData.traffic_congestion_risk)}`;

                const iRisk = document.getElementById('pred-infra');
                iRisk.textContent = predData.infrastructure_risk;
                iRisk.className = `data-value ${getRiskClass(predData.infrastructure_risk)}`;

                const rec = document.getElementById('pred-rec');
                rec.textContent = predData.recommendation;
                rec.classList.remove('loading');

                // --- C. Fetch Incidents and plot on map ---
                const incidentsRes = await fetch('/');
                const incidents = await incidentsRes.json();

                // --- D. Draw the Analytics Chart ---
                let high = 0, medium = 0, low = 0;

                // Count the severities
                incidents.forEach(inc => {
                    if (inc.severity.toLowerCase() === 'high') high++;
                    else if (inc.severity.toLowerCase() === 'medium') medium++;
                    else low++;
                });
                // Draw the Doughnut Chart
                const ctx = document.getElementById('severityChart').getContext('2d');

                // If a chart already exists, destroy it so we can draw a fresh one
                if (severityChartInstance) {
                    severityChartInstance.destroy();
                }
                severityChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['High', 'Medium', 'Low'],
                        datasets: [{
                            data: [high, medium, low],
                            backgroundColor: ['#ef4444', '#f59e0b', '#10b981'],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        plugins: {
                            legend: { labels: { color: 'white', font: { family: 'Outfit' } } }
                        }
                    }
                });



                incidents.forEach(inc => {
                    // Note: Our DB only stores text locations (e.g. "MG Road"). 
                    // For visualization purposes, we randomly scatter markers around Bengaluru's center.
                    // Using REAL GPS Coordinates from our Backend Geocoding!
                    const marker = L.circleMarker([inc.latitude, inc.longitude], {
                        radius: 8,
                        fillColor: getSeverityColor(inc.severity),
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    }).addTo(map);

                    let popupContent = `
                        <strong style="color:#38bdf8; font-size:1.1rem;">${inc.type.toUpperCase()}</strong><br>
                        <span style="color:#cbd5e1;">Location:</span> ${inc.location}<br>
                        <span style="color:#cbd5e1;">Severity:</span> <b style="color:${getSeverityColor(inc.severity)}">${inc.severity}</b>
                    `;

                    if (inc.image_url) {
                        popupContent += `<br><img src="${inc.image_url}" style="width:100%; max-height:150px; border-radius:8px; margin-top:8px; object-fit:cover;">`;
                    }

                    marker.bindPopup(popupContent);
                });

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Helper functions for styling colors
        function getRiskClass(riskLevel) {
            if (riskLevel.toLowerCase() === 'high') return 'risk-high';
            if (riskLevel.toLowerCase() === 'medium') return 'risk-medium';
            return 'risk-low';
        }

        function getSeverityColor(severity) {
            if (severity.toLowerCase() === 'high') return '#ef4444'; // Red
            if (severity.toLowerCase() === 'medium') return '#f59e0b'; // Orange
            return '#10b981'; // Green
        }
        //4. --- Handle Form Submission ---
        document.getElementById('incident-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formMsg = document.getElementById('form-msg');
            formMsg.style.display = 'block';
            formMsg.textContent = 'Submitting...';

            const formData = new FormData();
            formData.append('type', document.getElementById('inc-type').value);
            formData.append('location', document.getElementById('inc-loc').value);
            formData.append('severity', document.getElementById('inc-sev').value);
            formData.append('reported_by', document.getElementById('inc-user').value);
            formData.append('image', document.getElementById('inc-image').files[0]); // Handle file

            const response = await fetch('/incidents', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                formMsg.style.color = '#10b981';
                formMsg.textContent = 'Incident Reported!';
                // Reset form
                document.getElementById('incident-form').reset();
                // Refresh map immediately
                updateDashboard();
            } else {
                formMsg.style.color = '#ef4444';
                formMsg.textContent = 'Error: ' + data.detail;
            }

            // Hide message after 3 seconds
            setTimeout(() => {
                formMsg.style.display = 'none';
            }, 3000);
        });
        // Run the function when the page loads!
        updateDashboard();
        // Auto-refresh the dashboard every 5 seconds (5000 milliseconds)
        setInterval(updateDashboard, 5000);

        // --- Handle City Graphics Toggle Button ---
        document.getElementById('toggle-analytics-btn').addEventListener('click', () => {
            const panel = document.getElementById('analytics-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        });
    </script>
</body>

</html>
